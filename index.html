<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>그리드락 개러지</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">3D 차량 퍼즐</p>
          <h1>그리드락 개러지</h1>
        </div>
        <div class="stats" aria-label="현재 플레이 정보">
          <span><strong id="stageLabel">1</strong> 스테이지</span>
          <span><strong id="timerLabel">00:00</strong> 시간</span>
          <span><strong id="moveLabel">0</strong> 이동</span>
        </div>
      </header>

      <section class="game-layout">
        <aside class="panel stage-panel">
          <div class="panel-header">
            <h2>스테이지</h2>
            <span id="difficultyLabel">입문</span>
          </div>
          <div id="stageGrid" class="stage-grid" aria-label="스테이지 선택"></div>
        </aside>

        <section class="board-section" aria-label="3D 게임 보드">
          <div id="sceneHost" class="scene-host"></div>
          <div class="action-bar">
            <button id="undoButton" type="button" title="되돌리기">되돌리기</button>
            <button id="resetButton" type="button" title="다시 시작">다시 시작</button>
            <button id="nextButton" type="button" title="다음 스테이지">다음</button>
          </div>
        </section>

        <aside class="panel leaderboard-panel">
          <div class="panel-header">
            <h2>리더보드</h2>
            <span>상위 50위</span>
          </div>
          <ol id="leaderboardList" class="leaderboard"></ol>
        </aside>
      </section>
    </main>

    <dialog id="clearDialog" class="clear-dialog">
      <form method="dialog">
        <p class="eyebrow">스테이지 클리어</p>
        <h2 id="clearTitle">멋진 탈출</h2>
        <p id="clearSummary"></p>
        <div class="dialog-actions">
          <button id="clearReplayButton" value="replay" type="submit">다시 하기</button>
          <button id="clearNextButton" value="next" type="submit">다음</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./src/main.js?v=click-target-2"></script>
  </body>
</html>
